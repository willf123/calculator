<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 12px;
        }

        #display {
            width: 100%;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background-color: #333333;
        }

        .operator { background-color: #FF9500; }
        .equals   { background-color: #4CAF50; }
        .clear    { background-color: #FF3B30; grid-column: span 4; }
    </style>
</head>
<body>
    <div class="calculator">
        <form action="/calculate" method="POST">
            <input type="text" name="expression" id="display" value="{{ result }}" readonly />

            <div class="buttons">
                <button type="button" onclick="press('7')">7</button>
                <button type="button" onclick="press('8')">8</button>
                <button type="button" onclick="press('9')">9</button>
                <button type="button" class="operator" onclick="press('/')">/</button>

                <button type="button" onclick="press('4')">4</button>
                <button type="button" onclick="press('5')">5</button>
                <button type="button" onclick="press('6')">6</button>
                <button type="button" class="operator" onclick="press('*')">*</button>

                <button type="button" onclick="press('1')">1</button>
                <button type="button" onclick="press('2')">2</button>
                <button type="button" onclick="press('3')">3</button>
                <button type="button" class="operator" onclick="press('-')">-</button>

                <button type="button" onclick="press('0')">0</button>
                <button type="button" onclick="press('.')">.</button>
                <button type="submit" class="equals">=</button>
                <button type="button" class="operator" onclick="press('+')">+</button>

                <button type="button" class="clear" onclick="clearDisplay()">Clear</button>
            </div>
        </form>
    </div>

    <script>
        function press(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }
    </script>
</body>
</html>
